- name: Format disks
  filesystem:
    fstype: xfs
    dev: '{{ item }}'
  with_items:
    - "{{ bookie_storage_blk_devices }}"

- name: Mount disks
  mount:
    path: "{{ bookie_storage_mnt_paths[index] }}"
    src: "{{ item }}"
    fstype: xfs
    opts: defaults,noatime,nodiscard
    state: mounted
  loop: "{{ bookie_storage_blk_devices|flatten(levels=1) }}"
  loop_control:
    index_var: index

- name: Change bookie directory ownership
  file:
    path: "{{ item }}"
    state: directory
    recurse: yes
    owner: "{{ pulsar_user }}"
    group: "{{ pulsar_user }}"
  with_items:
    - "{{ bookie_storage_mnt_paths }}"