---
- name: Modify zookeeper config for customized settings
  lineinfile:
    path: "{{ gzk_conf_file }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  with_items:
    - { regexp: '^dataDir=', line: 'dataDir={{ gzk_data_dir }}' }
    - { regexp: '^clientPort=', line: 'clientPort={{ gzk_clnt_port }}' }
    - { regexp: '^admin.enableServer=', line: 'admin.enableServer={{ gzk_admin_srv_enable | lower}}' }
    - { regexp: '^admin.serverPort=', line: 'admin.serverPort={{ gzk_admin_srv_port }}' }

# Optional: to make it easy for running zookeeper commands
- name: Modify zookeeper config to add 4lw words whitelist
  lineinfile:
    path: "{{ gzk_conf_file }}"
    line: "4lw.commands.whitelist={{ gzk_cmd_white_list }}"
  when: gzk_enable_4lw_cmd|bool

- name: Modify zookeeper config fiile to add zookeeper node list
  lineinfile:
    path: "{{ gzk_conf_file }}"
    line: "server.{{ item.0 + 1 }}={{ item.1 }}"
  with_indexed_items:
    - "{{ zknode_cfg_list_global }}"

- name: Create global zookeeper data folder - "{{ gzk_data_dir }}"
  file:
    path: "{{ gzk_data_dir }}"
    state: directory
    owner: "{{ pulsar_user }}"
    group: "{{ pulsar_user }}"

- name: Get zookeeper server ID
  shell: grep {{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }} {{ gzk_conf_file }} | awk -F'=' '{print $1}' | awk -F'.' '{print $2}'
  register: cmdoutput

- name: Set fact of zookeeper server ID
  set_fact: myid={{ cmdoutput.stdout }}

- name: Define myid file for each zookeeper server
  copy:
    dest: "{{ gzk_data_dir }}/myid"
    owner: "{{ pulsar_user }}"
    group: "{{ pulsar_user }}"
    content: |
      {{ myid }}