- name: Format disks
  filesystem:
    fstype: xfs
    dev: '{{ item }}'
  with_items:
    - "{{ zk_storage_blk_device }}"

- name: Mount disks
  mount:
    path: "{{ zk_storage_mnt_path }}"
    src: "{{ zk_storage_blk_device }}"
    fstype: xfs
    opts: defaults,noatime,nodiscard
    state: mounted

- name: Change bookie directory ownership
  file:
    path: "{{ zk_data_dir }}"
    state: directory
    recurse: yes
    owner: "{{ pulsar_user }}"
    group: "{{ pulsar_user }}"