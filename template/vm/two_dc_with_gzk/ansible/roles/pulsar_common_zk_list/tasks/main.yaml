# == Global ZK ==
- name: (GlobalZK) Get zookeeper configuration (IP:Port:Port) list (No DNS) into a temporary file "/tmp/zkcfg_list_global"
  template: src=zklist_global.j2 dest=/tmp/zkcfg_list_global mode=0664

