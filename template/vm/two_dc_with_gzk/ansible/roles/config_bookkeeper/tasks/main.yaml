---
#- debug: msg={{ hostvars[groups['pulsar_zookeeper'][0]]['zk_list_str'] }}
- name: Modify bookkeeper main config file - {{ bk_conf_file }}
  lineinfile:
    path: "{{ bk_conf_file }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  with_items:
    - { regexp: '^bookiePort=', line: 'bookiePort={{ bookie_listening_port }}' }
    - { regexp: '^httpServerPort=', line: 'httpServerPort={{ bk_stats_port }}' }
    - { regexp: '^prometheusStatsHttpPort=', line: 'prometheusStatsHttpPort={{ bk_stats_port }}' }
    # - { regexp: '^# journalDirectories=', line: 'journalDirectories={{ bookie_storage_mnt_paths[0]}}' }
    # - { regexp: '^ledgerDirectories=', line: 'ledgerDirectories={{ bookie_storage_mnt_paths[1]}}' }
    # - { regexp: '^gcWaitTime=', line: 'gcWaitTime={{ gc_wait_time }}' }
    # - { regexp: '^journalSyncData=', line: 'journalSyncData={{ journal_sync }}' }

- name: (ClusterA) Modify bookkeeper main config file - {{ bk_conf_file }}
  lineinfile:
    path: "{{ bk_conf_file }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  with_items:
    - { regexp: '^zkServers=', line: "zkServers={{ zk_list_str_clusterA }}" }
  when: cluster_name=="ClusterA"

- name: (ClusterB) Modify bookkeeper main config file - {{ bk_conf_file }}
  lineinfile:
    path: "{{ bk_conf_file }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  with_items:
    - { regexp: '^zkServers=', line: "zkServers={{ zk_list_str_clusterB }}" }
  when: cluster_name=="ClusterB"

    