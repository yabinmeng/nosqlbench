---
- name: Check if zookeeper server is already running
  stat:
    path: "{{ tgt_pulsar_inst_dir }}/bin/pulsar-zookeeper.pid"
  register: stat_result

- name: Start zookeeper server (with default JVM setting), if it is not running yet
  become: true
  become_method: sudo
  become_user: "{{ pulsar_user }}"
  shell: "PULSAR_EXTRA_OPTS=\"-Dstats_server_port={{ zk_stats_port }}\" {{ tgt_pulsar_inst_dir }}/bin/pulsar-daemon start zookeeper"
  when: not stat_result.stat.exists and (customize_jvm is not defined or not customize_jvm|bool) 

- name: Start zookeeper server (with customized JVM setting), if it is not running yet
  become: true
  become_method: sudo
  become_user: "{{ pulsar_user }}"
  shell: "PULSAR_MEM=\"{{ pulsar_mem_zk }}\" PULSAR_EXTRA_OPTS=\"-Dstats_server_port={{ zk_stats_port }}\" {{ tgt_pulsar_inst_dir }}/bin/pulsar-daemon start zookeeper"
  when: not stat_result.stat.exists and (customize_jvm is defined and customize_jvm|bool) 

- name: Wait until zookeeper listeneing port {{ zk_clnt_port }} is ready
  wait_for:
    host: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"
    port: "{{ zk_clnt_port }}"
    delay: 2
    timeout: 120