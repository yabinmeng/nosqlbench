- name: (ClusterB) Get "zookeeper" (IP:Port) list (No DNS)
  set_fact:
    zk_list_str_clusterBTemp: "{% for node in groups['cluster_srv_B'] %}{%if hostvars[node].srv_type=='zk' %}{{ hostvars[node].private_ip }}:{{ zk_clnt_port }},{% endif %}{% endfor %}"
- name: Remove trailing "," character
  set_fact:
