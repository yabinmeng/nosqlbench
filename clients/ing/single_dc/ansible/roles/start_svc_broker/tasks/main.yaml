---
- name: Check if Pulsar broker is already running
  stat:
    path: "{{ tgt_pulsar_inst_dir }}/bin/pulsar-broker.pid"
  register: stat_result

- name: Start Pulsar broker (with default JVM setting), if it is not running yet
  become: true
  become_method: sudo
  become_user: "{{ pulsar_user }}"
  shell: "{{ tgt_pulsar_inst_dir }}/bin/pulsar-daemon start broker"
  when: not stat_result.stat.exists and (customize_jvm is not defined or not customize_jvm|bool) 

- name: Start Pulsar broker (with customized JVM setting), if it is not running yet
  become: true
  become_method: sudo
  become_user: "{{ pulsar_user }}"
  shell: "PULSAR_MEM=\"{{ pulsar_mem_broker }}\" {{ tgt_pulsar_inst_dir }}/bin/pulsar-daemon start broker"
  when: not stat_result.stat.exists and (customize_jvm is defined and customize_jvm|bool) 

- name: Wait until broker service ports and web service prots are ready
  wait_for:
    host: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"
    port: "{{ item }}"
    delay: 2
    timeout: 120
  with_items:
    - "{{ broker_svc_port }}"
    - "{{ web_svc_port }}"
    #- "{{ broker_svc_port_tls }}"
    #- "{{ web_svc_port_tls }}"