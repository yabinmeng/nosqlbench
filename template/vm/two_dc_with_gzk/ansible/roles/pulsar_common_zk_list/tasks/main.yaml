##
# Get a string for all zookeeper nodes with listening ports, e.g.
#   <zookeeper_node_1>:2184,<zookeeper_node_2>:2184,<zookeeper_node_3>:2184
- name: Get "zookeeper" (IP:Port) list (No DNS)
  set_fact:
    zk_list_str_globalTemp: "{% for node in groups['global_zk'] %}{{ hostvars[node].private_ip }}:{{ gzk_clnt_port }},{% endfor %}"
- name: Remove trailing "," character
  set_fact:
    zk_list_str_global: "{{ zk_list_str_globalTemp | regex_replace(',$','') }}"     
- debug: msg="zk_list_str_global - {{ zk_list_str_global }}"
  when: show_debug_msg|bool