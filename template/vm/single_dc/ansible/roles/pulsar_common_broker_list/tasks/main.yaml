  set_fact:
    web_service_url_tls_str_temp: "{% for node in groups['cluster_srv'] %}{%if hostvars[node].srv_type=='broker' %}{{ hostvars[node].private_ip }}:{{ web_svc_port_tls }},{% endif %}{% endfor %}"
- name: Remove trailing "," character    
  set_fact:
    web_service_url_tls_str: "{{ web_service_url_tls_str_temp | regex_replace(',$','') }}"     
- debug: msg="web_service_url_tls_str - {{ web_service_url_tls_str }}"
  when: show_debug_msg|bool

